name: Deploy Website

on:
  push:
    branches:
      - main  # Deployment triggers when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to Server (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 21098
          source: "."
          # IMPORTANT: Change 'your_folder_name' to your actual subfolder name if needed
          target: "/home/sreezmqo/public_html/your_folder_name"

      - name: Execute Remote Commands (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 21098
          script: |
            cd /home/sreezmqo/public_html/your_folder_name
            # If this is Django, we touch this file to reload the app
            touch passenger_wsgi.py