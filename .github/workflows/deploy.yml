name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies and Build
        run: |
          npm install
          npm run build  # This creates your 'dist' or 'build' folder

      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21098 # Change to 22 if your host uses default SSH
          source: "dist/*" # Or "build/*" depending on your framework (Vite uses dist)
          target: "/home/${{ secrets.SSH_USER }}/public_html"
          strip_components: 1 # This prevents it from creating a 'dist' folder on the server